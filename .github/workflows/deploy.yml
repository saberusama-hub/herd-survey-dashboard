name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install web deps
        run: pnpm install --frozen-lockfile
      # The parquet bundle in apps/web/public/data/ is committed. CI does NOT
      # rebuild it (the source data lake isn't reachable from GitHub Actions).
      # Run `pnpm data:build` locally and commit the resulting parquet files
      # to refresh the deployment.
      - name: Build web (static export)
        run: pnpm build
      - name: Publish to Cloudflare Workers (Static Assets)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: "4.95.0"
          packageManager: npm
          command: deploy
